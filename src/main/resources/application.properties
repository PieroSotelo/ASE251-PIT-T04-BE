spring.application.name=Fundo

# ============================================
# CONFIGURACION SQL SERVER - AgroExportDB
# ============================================
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=AgroExportDB;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:Admin1234!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false

# Puerto del servidor
server.port=8080
